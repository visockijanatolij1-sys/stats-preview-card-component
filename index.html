<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Preview Card Component</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Lexend+Deca&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="card">
                <div class="card-content">
                    <h1 class="content-card__title">Get <span>insights</span> that help your business grow.</h1>
                    <p class="content-card__text">
                        Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
                    </p>
                    <div class="content-card_block">
                        <div class="content-card__stat">
                            <p class="content-card__number">10k+</p>
                            <p class="content-card__text">COMPANIES</p>
                        </div>
                        <div class="content-card__stat">
                            <p class="content-card__number">314</p>
                            <p class="content-card__text">TEMPLATES</p>
                        </div>
                        <div class="content-card__stat">
                            <p class="content-card__number">12M+</p>
                            <p class="content-card__text">QUERIES</p>
                        </div>
                    </div>
                </div>
                <div class="card-image">
                    <img src="./img/image-header-desktop.jpg" alt="Image Workers">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
